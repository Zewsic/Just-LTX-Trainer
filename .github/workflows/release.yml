name: Release

# Запускается на создание тега вида v0.1.0 или вручную из GitHub Actions UI.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS (universal)
            os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: Windows (x64)
            os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            tauri-args: ""
          - platform: Linux (x64)
            os: ubuntu-22.04
            rust-targets: x86_64-unknown-linux-gnu
            tauri-args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.os }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Just LTX Trainer ${{ github.ref_name }}"
          releaseBody: |
            Авто-сборка из тега `${{ github.ref_name }}`.

            **macOS**: универсальный `.dmg` (Intel + Apple Silicon). Сборка
            без подписи — при первом запуске:
            `xattr -dr com.apple.quarantine "/Applications/Just LTX Trainer.app"`
            либо через ПКМ → Открыть.

            **Windows**: `.msi` инсталлер (x64). Сборка без подписи — Windows
            SmartScreen покажет предупреждение, кликни «Подробнее → Выполнить».

            **Linux**: `.AppImage` и `.deb` (x64). AppImage — `chmod +x` и
            запуск; deb — `sudo apt install ./just-ltx-trainer_*.deb`.
            Требуется `libwebkit2gtk-4.1` в системе.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri-args }}
